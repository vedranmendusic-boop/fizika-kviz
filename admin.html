<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Admin — Kviz Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-login { margin-top: 15vh; text-align: center; }
    .admin-login h1 { font-size: 1.4rem; color: var(--accent); margin-bottom: 8px; }
    .admin-login p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 28px; }
    .pin-input { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 0.3em; color: var(--text-primary); text-align: center; width: 180px; outline: none; }
    .pin-input:focus { border-color: var(--accent); }
    .pin-error { color: var(--danger); font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
    .admin-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .admin-tab { flex: 1; padding: 10px 6px; font-family: var(--font-display); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
    .admin-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
    .admin-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .admin-toolbar h1 { font-size: 1.2rem; color: var(--accent); }
    .admin-count { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-display); }
    .btn-danger { background: rgba(255,77,106,0.1); color: var(--danger); border: 1px solid rgba(255,77,106,0.3); }
    .btn-danger:hover { background: rgba(255,77,106,0.2); border-color: var(--danger); }
    .admin-row { display: grid; grid-template-columns: 1fr 50px 70px auto; align-items: center; padding: 12px 16px; gap: 10px; border-bottom: 1px solid var(--border); transition: background 0.2s; }
    .admin-row:hover { background: var(--bg-card-hover); }
    .admin-row:last-child { border-bottom: none; }
    .admin-row.header { font-family: var(--font-display); font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 16px; background: rgba(0,0,0,0.2); }
    .admin-row.header:hover { background: rgba(0,0,0,0.2); }
    .admin-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .admin-score { font-family: var(--font-display); font-size: 0.8rem; color: var(--accent); text-align: center; }
    .admin-time { font-size: 0.8rem; color: var(--text-secondary); text-align: center; }
    .admin-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .btn-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; padding: 0; }
    .btn-icon:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,77,106,0.08); }
    .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 380px; }
    .modal h2 { font-size: 1rem; color: var(--accent); margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.75rem; font-family: var(--font-display); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--font-body); font-size: 0.95rem; color: var(--text-primary); outline: none; }
    .form-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; }
    .confirm-text { font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; }
    .confirm-warning { font-size: 0.8rem; color: var(--danger); margin-bottom: 20px; }
    .admin-footer { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="container">
    <div id="screen-login" class="screen active">
      <div class="admin-login">
        <h1>🔐 Admin</h1>
        <p>Upiši PIN za pristup</p>
        <input id="pin-input" class="pin-input" type="password" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="····" autocomplete="off" />
        <div id="pin-error" class="pin-error"></div>
      </div>
    </div>

    <div id="screen-admin" class="screen">
      <div class="admin-toolbar">
        <div>
          <h1>⚙️ Admin panel</h1>
          <span id="result-count" class="admin-count"></span><br><span id="admin-uid" class="admin-count"></span>
        </div>
        <button id="btn-delete-all" class="btn btn-danger btn-sm">🗑️ Obriši sve</button>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab active" id="tab-fizika7" data-cat="fizika7">⚛️ Fizika 7</button>
        <button class="admin-tab" id="tab-fizika8" data-cat="fizika8">🔬 Fizika 8</button>
        <button class="admin-tab" id="tab-opce" data-cat="opce">🧠 Opće zn.</button>
      </div>

      <div id="admin-content" class="leaderboard-table">
        <div class="loader"><div class="spinner"></div>Učitavanje…</div>
      </div>

      <div class="admin-footer">
        <a href="index.html" class="nav-link">🏫 Kviz</a>
        <a href="leaderboard.html" class="nav-link">📊 Lista</a>
        <a href="projektor.html" class="nav-link">🖥️ Projektor</a>
        <a href="questions-7.json" class="nav-link" target="_blank">📝 F7</a>
        <a href="questions-8.json" class="nav-link" target="_blank">📝 F8</a>
        <a href="questions-opce.json" class="nav-link" target="_blank">📝 Opće</a>
      </div>
    </div>
  </div>

  <div id="modal-edit" class="modal-overlay">
    <div class="modal">
      <h2>✏️ Uredi rezultat</h2>
      <div class="form-group"><label class="form-label">Ime</label><input id="edit-name" class="form-input" type="text" maxlength="20" /></div>
      <div class="form-group"><label class="form-label">Bodovi (0–20)</label><input id="edit-score" class="form-input" type="number" min="0" max="20" /></div>
      <div class="form-group"><label class="form-label">Vrijeme (ms)</label><input id="edit-time" class="form-input" type="number" min="0" /></div>
      <div class="modal-actions">
        <button id="btn-edit-cancel" class="btn btn-secondary btn-sm">Odustani</button>
        <button id="btn-edit-save" class="btn btn-primary btn-sm">💾 Spremi</button>
      </div>
    </div>
  </div>

  <div id="modal-confirm" class="modal-overlay">
    <div class="modal">
      <h2>🗑️ Potvrdi brisanje</h2>
      <p id="confirm-text" class="confirm-text"></p>
      <p class="confirm-warning">Ova radnja se ne može poništiti.</p>
      <div class="modal-actions">
        <button id="btn-confirm-cancel" class="btn btn-secondary btn-sm">Odustani</button>
        <button id="btn-confirm-delete" class="btn btn-danger btn-sm">🗑️ Obriši</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
